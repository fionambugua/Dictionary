<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Dictionary</title>
  </head>
  <body>
    <div id="searchCard">
      <h1 id="heading">Wordly</h1>
      <p>Search for you word here!</p>

      <form id="search">
        <input
          type="text"
          id="searchInput"
          placeholder="word to search here"
          required
        />
        <button type="submit" id="searchButton">Search</button>
      </form>

      <div id="result">
        <p>Type in a word to search</p>
      </div>
    </div>

    <script src="./code.js"></script>
  </body>
</html>
